# Lint + test gate for the Python pipeline (scraper/segmenter/agent/comparator/...).
# Runs ruff (pyflakes + syntax rules) and pytest on Python changes. Pure-stdlib
# project, so the only install deps are the tooling itself.

name: Python CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
      - name: Ruff (pyflakes F + syntax E9)
        run: ruff check .
      - name: Pytest (with coverage gate)
        run: |
          python -m pytest tests/ \
            --cov=scraper --cov=segmenter --cov=comparator \
            --cov-fail-under=55 --cov-report=term-missing
